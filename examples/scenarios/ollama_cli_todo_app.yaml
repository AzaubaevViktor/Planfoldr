id: ollama_cli_todo_app_demo
goal: Generate a Python CLI todo-list project with tests through local Ollama.

inputs:
  workspace_root: "{{ runtime.workspace_dir }}"
  repository_path: "{{ runtime.workspace_dir }}/project"

outputs:
  report_path: "{{ runtime.run_dir }}/report.html"
  trace_path: "{{ runtime.run_dir }}/trace"

required_conditions:
  - id: generated_tests_pass
    verifier_task: run_tests

constraints:
  tools:
    allow:
      - git
      - python
      - write_files
    deny:
      - git push
  filesystem:
    allow_read:
      - .
      - "{{ runtime.run_dir }}"
    allow_write:
      - "{{ runtime.run_dir }}"

budgets:
  max_iterations: 12
  max_tool_calls: 16
  max_model_calls: 6
  max_cpu_time: 30

context_policy:
  default_task_parent_read: true
  default_task_parent_write: false

defaults:
  model:
    provider: ollama
    name: llama3.1
  retry:
    invalid_output: 2

cycles:
  - file: ./cycles/ollama_cli_todo_app.yaml
