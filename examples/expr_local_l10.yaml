# Hardening ladder #5: a multi-module expression evaluator (lexer -> parser -> evaluator -> CLI).
# Unlike ladders #1-#4 this is NOT a single file: it can only pass if the harness decomposes the
# goal into several interdependent tickets, resolves their blocked_by order through the Ticket
# Graph, and keeps a shared interface contract coherent across separate cycles. That is the point
# of this rung -- it stresses the orchestration, not the model.
name: expr_local_l10
goal: >
  Build a small integer/real arithmetic expression evaluator, split across FOUR cooperating
  Python files in the workspace (stdlib only). The split is mandatory:
    1. lexer.py        -- tokenize(src: str) -> list  turns "2 + 3*4" into a token sequence
                          covering integers, the operators + - * /, and parentheses ( ).
    2. expr_parser.py  -- parse(tokens) -> AST  builds an abstract syntax tree from the lexer's
                          tokens, honouring precedence (* and / bind tighter than + and -) and
                          LEFT associativity, with parentheses overriding precedence.
    3. evaluator.py    -- evaluate(ast) -> number  walks the AST and computes the value. Division
                          is true division (7/2 == 3.5). Division by zero must raise
                          ZeroDivisionError -- never return 0 or a wrong number.
    4. calc.py         -- calc(src: str) -> number  the entry point: it must WIRE the pipeline,
                          i.e. evaluate(parse(tokenize(src))). It must import and call the other
                          three modules, not re-implement them inline.
  expr_parser depends on the token shape produced by lexer; evaluator depends on the AST shape
  produced by expr_parser; calc depends on all three. Agree the token/AST contract once and keep
  it consistent across the files.
budget:
  tokens: 260000
accesses:
  - path: ./
    mode: read_write
verification:
  commands:
    # Level 1 — modules load, wiring is real
    - "python3 -c \"import calc, lexer, expr_parser, evaluator; print('modules-ok')\""
    - "python3 -c \"import inspect, calc; s=inspect.getsource(calc); assert all(k in s for k in ('tokenize','parse','evaluate')); print('wired-ok')\""

    # Level 2 — single literals and trivial expressions
    - "python3 -c \"import calc; assert calc.calc('42')==42; print('literal-ok')\""
    - "python3 -c \"import calc; assert calc.calc('0')==0; print('zero-literal-ok')\""

    # Level 3 — basic operator correctness
    - "python3 -c \"import calc; assert calc.calc('2+3*4')==14; print('prec-ok')\""
    - "python3 -c \"import calc; assert calc.calc('7/2')==3.5; print('true-div-ok')\""
    - "python3 -c \"import calc; assert calc.calc('3-5')==-2; print('negative-result-ok')\""
    - "python3 -c \"import calc; assert calc.calc('0*999')==0; print('zero-mul-ok')\""

    # Level 4 — left-associativity (the rules must be general, not hard-coded per expression)
    - "python3 -c \"import calc; assert calc.calc('10-2-3')==5; print('sub-assoc-ok')\""
    - "python3 -c \"import calc; assert calc.calc('2*3*4')==24; print('mul-assoc-ok')\""
    - "python3 -c \"import calc; assert calc.calc('12/4/3')==1.0; print('div-assoc-ok')\""

    # Level 5 — whitespace tolerance and parentheses
    - "python3 -c \"import calc; assert calc.calc('  2  +  3  ')==5; print('whitespace-ok')\""
    - "python3 -c \"import calc; assert calc.calc('(2+3)*4')==20; print('paren-ok')\""
    - "python3 -c \"import calc; assert calc.calc('(1+2)*(3+4)')==21; print('cross-paren-ok')\""
    - "python3 -c \"import calc; assert calc.calc('((2+3))*((4-1))')==15; print('double-paren-ok')\""

    # Level 6 — precedence inside parentheses, all four operators combined
    - "python3 -c \"import calc; assert calc.calc('2*(3+4*5)')==46; print('prec-inside-paren-ok')\""
    - "python3 -c \"import calc; assert calc.calc('1+2*3-4/2')==5.0; print('four-ops-ok')\""

    # Level 7 — compound stress expression
    # 100/4 = 25.0, 25.0*(3+2) = 125.0, 10*2 = 20, 125.0-20 = 105.0
    - "python3 -c \"import calc; assert calc.calc('100/4*(3+2)-10*2')==105.0; print('compound-ok')\""

    # Level 8 — error path: division by zero must propagate, not be swallowed
    - "python3 -c \"import calc\ntry:\n    calc.calc('1/0')\n    raise AssertionError('ZeroDivisionError not raised')\nexcept ZeroDivisionError:\n    print('divzero-ok')\""

  criteria:
    - "The implementation is genuinely split across lexer.py, expr_parser.py, evaluator.py and calc.py -- not collapsed into one file, and calc.py wires the other three rather than re-implementing them."
    - "Left-associativity is implemented as a general rule in the parser (not as hard-coded operand counts). Evidence: div-assoc-ok -- 12/4/3 must equal 1.0, not 9.0; sub-assoc-ok -- 10-2-3 must equal 5, not 11."
    - "Division is true (/) throughout: 7/2==3.5 and 12/4/3==1.0. Integer floor division (//) anywhere is a defect."
    - "ZeroDivisionError propagates out of calc.calc('1/0') unmodified -- it must not be caught inside lexer/parser/evaluator and silently replaced with 0 or None."
    - "Whitespace in the input string ('  2  +  3  ') is handled by the tokenizer, not by pre-stripping in calc.py. The tokenizer must skip whitespace between tokens."
model:
  provider: ollama
  name: gemma4:26b-mlx
  parameter_count: 26000000000
